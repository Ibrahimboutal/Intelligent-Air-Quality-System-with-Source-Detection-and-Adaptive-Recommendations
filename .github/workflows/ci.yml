name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-tests:
    name: Python Edge Service Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pyserial
        
    - name: Run Pytest with Coverage
      run: |
        pytest --cov=scripts/ tests/ --cov-report=xml
        
    - name: Upload Python Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: python
        token: ${{ secrets.CODECOV_TOKEN }}

  matlab-tests:
    name: MATLAB Intelligence Hub Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up MATLAB
      uses: matlab-actions/setup-matlab@v1
      
    - name: Run MATLAB Unit Tests with Coverage
      uses: matlab-actions/run-tests@v1
      with:
        select-by-folder: tests
        code-coverage-cobertura: coverage_matlab.xml
        
    - name: Upload MATLAB Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage_matlab.xml
        flags: matlab
        token: ${{ secrets.CODECOV_TOKEN }}
