name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    name: Python Edge Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyserial

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=scripts \
            --cov-report=xml \
            --cov-report=term

      - name: Upload Python Coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: python
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  matlab-tests:
    name: MATLAB Intelligence Hub Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ⚠️ IMPORTANT: requires MATLAB license
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          products: >-
            Statistics_and_Machine_Learning_Toolbox
            Signal_Processing_Toolbox
            Econometrics_Toolbox
            Instrument_Control_Toolbox

      - name: Run MATLAB tests with coverage
        uses: matlab-actions/run-tests@v2
        with:
          select-by-folder: tests
          source-folder: src;scripts
          code-coverage-cobertura: coverage_matlab.xml
          test-results-junit: results.xml

      - name: Upload MATLAB Coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage_matlab.xml
          flags: matlab
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload MATLAB test results (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: matlab-test-results
          path: results.xml